<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Types Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: #0a0a0f;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #16161d;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid #2a2a35;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e50914, #f5c518);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8a8a9a;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .feature {
            text-align: center;
        }

        .feature-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: #f5c518;
        }

        .feature-label {
            font-size: 14px;
            color: #8a8a9a;
        }

        .btn {
            display: inline-block;
            background: #e50914;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            padding: 16px 48px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #f5c518;
            color: #0a0a0f;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">🎬</div>
            <h1 class="logo">MOVIE QUIZ</h1>
            <p class="subtitle">Test your cinema knowledge across 30 questions</p>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-number">30</div>
                    <div class="feature-label">Questions</div>
                </div>
                <div class="feature">
                    <div class="feature-number">All</div>
                    <div class="feature-label">Genres</div>
                </div>
                <div class="feature">
                    <div class="feature-number">∞</div>
                    <div class="feature-label">Fun</div>
                </div>
            </div>
            
            <form action="{{ url_for('start') }}" method="POST">
                <button type="submit" class="btn">START QUIZ</button>
            </form>
        </div>
    </div>
</body>
</html>
