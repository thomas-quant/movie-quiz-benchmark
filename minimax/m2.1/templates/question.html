<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question {{ question_number }} - Movie Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
        }
        .progress {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        h1 {
            color: #1a1a2e;
            font-size: 1.9rem;
            margin-bottom: 35px;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option {
            display: block;
        }
        .option input {
            display: none;
        }
        .option label {
            display: block;
            padding: 18px 25px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.1rem;
            color: #333;
        }
        .option label:hover {
            background: #eef2f5;
            border-color: #e94560;
            transform: translateX(5px);
        }
        .option input:checked + label {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            border-color: #e94560;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress">Question {{ question_number }} of {{ total }}</div>
        <h1>{{ question }}</h1>
        <form action="/quiz" method="POST">
            <div class="options">
                {% for option in options %}
                <div class="option">
                    <input type="radio" name="answer" id="option{{ loop.index0 }}" value="{{ loop.index0 }}" required>
                    <label for="option{{ loop.index0 }}">{{ option }}</label>
                </div>
                {% endfor %}
            </div>
            <button type="submit" style="margin-top: 30px; background: linear-gradient(135deg, #e94560 0%, #c73e54 100%); color: white; border: none; padding: 15px 40px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-family: 'Georgia', serif;">Submit Answer</button>
        </form>
    </div>
</body>
</html>
