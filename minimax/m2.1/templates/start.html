<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
        }
        h1 {
            color: #1a1a2e;
            font-size: 2.8rem;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        p {
            color: #555;
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 35px;
        }
        .start-btn {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            font-weight: 500;
        }
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movie Trivia Quiz</h1>
        <p>Test your knowledge of film history, directors, and iconic movies across 30 questions.</p>
        <form action="/quiz" method="GET">
            <button type="submit" class="start-btn">Start Quiz</button>
        </form>
    </div>
</body>
</html>
