<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Genre Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 8px; background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #a0a0b0; margin-bottom: 32px; font-size: 1.1rem; }
        .btn {
            display: inline-block;
            padding: 14px 48px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4); }
        .info { margin-top: 24px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movie Type Quiz</h1>
        <p class="subtitle">Test your knowledge of film genres</p>
        <a href="{{ url_for('question', qid=0) }}" class="btn">Start Quiz</a>
        <p class="info">{{ total }} questions &middot; one per page &middot; see your score at the end</p>
    </div>
</body>
</html>
