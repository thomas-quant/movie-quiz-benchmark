<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Movie Types Quiz{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('index') }}">Movie Types Quiz</a>
      <form action="{{ url_for('start') }}" method="post">
        <button class="link-button" type="submit">Restart</button>
      </form>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
